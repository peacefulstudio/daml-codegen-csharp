name: Publish Splice DAR Packages

on:
  workflow_dispatch:
    inputs:
      splice_version:
        description: 'Splice version (decentralized-canton-sync release tag, e.g. 0.6.5).'
        required: false
        type: string
        default: '0.6.5'
      codegen_cs_version:
        description: 'Version of ghcr.io/peacefulstudio/dpm-codegen-cs to pull. Empty = Directory.Build.props <Version>.'
        required: false
        type: string
        default: ''
      damlc_version:
        description: 'damlc component version listed under daml.yaml components.'
        required: false
        type: string
        default: '3.4.11'
      runtime_version:
        description: 'Daml.Runtime NuGet version referenced from generated csprojs. Empty = Directory.Build.props <Version>.'
        required: false
        type: string
        default: ''
      package_license:
        description: 'SPDX license expression emitted into generated csprojs.'
        required: false
        type: string
        default: 'Apache-2.0'
      dry_run:
        description: 'Build + pack + verify but skip the NuGet push AND the SPLICE_RELEASE_COUNTERS write-back.'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    uses: ./.github/workflows/_publish-dar-packages.yaml
    permissions:
      contents: write
      id-token: write
      packages: read
    with:
      source_label: Splice
      download_url: https://github.com/digital-asset/decentralized-canton-sync/releases/download/v${{ inputs.splice_version }}/${{ inputs.splice_version }}_splice-node.tar.gz
      dar_find_path: '*/dars/*.dar'
      dar_patterns: |
        splice-*
      counter_variable: SPLICE_RELEASE_COUNTERS
      codegen_cs_version: ${{ inputs.codegen_cs_version }}
      damlc_version: ${{ inputs.damlc_version }}
      runtime_version: ${{ inputs.runtime_version }}
      package_license: ${{ inputs.package_license }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      COUNTERS_TOKEN: ${{ secrets.RELEASE_COUNTERS_TOKEN }}
      NUGET_USER: ${{ secrets.NUGET_USER }}
